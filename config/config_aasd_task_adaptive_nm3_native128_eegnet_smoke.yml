# AASD smoke config — task-discriminative GEDAI with full-trial 60 s input,
# frequency-adaptive epoching, GEDAI NM=3.0, native 128 Hz processing,
# and EEGNet as the only backbone.
data_root: ./data/aasd/npz
results_root: ./results/task_adaptive_nm3_native128_eegnet_smoke
dataset_label: aasd

subjects: [1]

sampling_rate: 128

bandpass:
  l_freq: 0.1
  h_freq: 45.0

cv:
  n_splits: 2
  shuffle: true
  random_state: 42
  aasd_group_trials: true
  aasd_merge_to_2s: true

statistics:
  subject_chance_method: binomial
  pipeline_comparison_method: mann_whitney

permutation:
  n_subject_level: 0
  n_pipeline_level: 0
  adaptive_step_up: false

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: false
  use_tangent_space: false
  use_time_lda: false
  use_transformer: false
  use_eegnet: true
  eegnet_target_sfreq: 128
  eegnet_epochs: 3
  eegnet_batch_size: 16
  eegnet_learning_rate: 0.0001
  eegnet_weight_decay: 0.0001
  eegnet_dropout: 0.25
  eegnet_F1: 8
  eegnet_D: 2
  eegnet_F2: 16
  eegnet_kernel_length: 128
  eegnet_val_fraction: 0.111
  eegnet_patience: 3
  eegnet_device: cpu
  eegnet_paper_exact: true
  use_shallow_convnet: false

denoising:
  use_baseline: true
  use_icalabel: false
  use_asr: false
  use_gedai: true
  gedai_aasd_adaptive_gate: true
  gedai_aasd_gate_margin: -0.02
  gedai_aasd_gate_inner_splits: 2
  gedai_aasd_perfold_refcov: true
  gedai_aasd_duration_s: 60.0
  gedai_aasd_broadband_noise_multiplier: 3.0
  gedai_aasd_spectral_noise_multiplier: 3.0
  gedai_aasd_resample_hz: 0.0
  gedai_aasd_adaptive_epoching: true
  gedai_aasd_epoch_size_in_cycles: 12.0

signal_integrity:
  channels_of_interest: ["F3", "Fz", "F4", "C3", "Cz", "C4", "P3", "Pz", "P4"]
  segment_duration_s: 1.0
