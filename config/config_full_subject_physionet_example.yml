# Example config for testing with REAL data: PhysioNet EEGBCI, full subject set (or subset).
#
# 1. Prepare data first:
#    python -m src.data.prepare_physionet_eegbci --subjects 1 2 3 4 5 --out-root data/physionet_eegbci
#
# 2. Point this config to that folder and same subject list below.
# 3. Run: python -m src.run_all --config config/config_full_subject_physionet_example.yml
#
# For a quick full-subject sanity check use e.g. subjects [1,2,3]; for full benchmark use 1–109.

# Run this dataset independently; do not mix with BNCI.
data_root: ./data/physionet_eegbci
results_root: ./results/physionet_eegbci
dataset_label: physionet_eegbci

# Use same IDs as in prepare_physionet_eegbci --subjects
subjects: [1, 2, 3, 4, 5]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 1000
  n_pipeline_level: 10000

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: true

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: true
  use_gedai: false

signal_integrity:
  channels_of_interest: ["C3", "C4"]
  segment_duration_s: 4.0
