# Synthetic / CI tests: integration tests override data_root and results_root to tmp_path.
# Named for Alljoined-only config layout (dataset_label matches other alljoined YAMLs).

data_root: ./data
results_root: ./results
dataset_label: alljoined_test

subjects: [1, 2]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

statistics:
  subject_chance_method: binomial
  pipeline_comparison_method: mann_whitney

permutation:
  n_subject_level: 0
  n_pipeline_level: 50

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: true

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: true
  use_gedai: false
  use_asr: false
  use_pylossless: false

signal_integrity:
  channels_of_interest: ["Ch0", "Ch1"]
  segment_duration_s: 2.0
