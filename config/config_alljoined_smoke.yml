# config_alljoined_smoke.yml
# Pilot smoke test for Alljoined-1.6M (Consumer EEG)

data_root: data/alljoined/processed
results_root: results/alljoined_smoke
dataset_label: alljoined

subjects: [1, 2]

sampling_rate: 250

bandpass:
  l_freq: 1.0
  h_freq: 40.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 100
  n_pipeline_level: 1000

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: true
  use_gedai: true
  use_asr: true

signal_integrity:
  channels_of_interest: ["O1", "Oz", "Cz"]
  segment_duration_s: 1.0
