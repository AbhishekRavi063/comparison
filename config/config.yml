data_root: ./data
results_root: ./results

# List of subject identifiers (filenames will typically be subject_<id>.npz)
subjects: [1]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 1000
  n_pipeline_level: 10000

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: true  # save trained model per (subject, backbone, pipeline) after each run

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: false
  use_gedai: false
  use_asr: false

signal_integrity:
  channels_of_interest: ["C3", "C4"]
  segment_duration_s: 4.0
