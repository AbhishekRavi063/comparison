# Riemannian + CSP sanity check with MU/alpha band (7–13 Hz).
# Same NPZ pipeline as wideband config; secondary ablation per professor note
# (attention/imagery often emphasize this band).
#
# Run:
#   python3 -m src.run_all --config config/config_aasd_riemannian_mu713_full4sub.yml \
#     --results-root results/aasd_riemannian_mu713_full4sub
#
# Compare to wideband (0.1–45 Hz):
#   config/config_aasd_riemannian_full4sub.yml
data_root: ./data/aasd/npz
results_root: ./results/aasd_riemannian_mu713_full4sub
dataset_label: aasd

subjects: [1, 2, 3, 4]

sampling_rate: 128

bandpass:
  l_freq: 7.0
  h_freq: 13.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

statistics:
  subject_chance_method: binomial
  pipeline_comparison_method: mann_whitney

permutation:
  n_subject_level: 0
  n_pipeline_level: 0
  adaptive_step_up: false

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: true
  use_tangent_space: true
  use_time_lda: false
  use_transformer: false

denoising:
  use_baseline: true
  use_icalabel: false
  use_asr: false
  use_gedai: false

signal_integrity:
  channels_of_interest: ["F3", "Fz", "F4", "C3", "Cz", "C4", "P3", "Pz", "P4"]
  segment_duration_s: 1.0
