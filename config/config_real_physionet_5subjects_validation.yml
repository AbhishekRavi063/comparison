data_root: ./data/physionet_eegbci
results_root: ./results/physionet_5subjects_validation
dataset_label: physionet_eegbci_5_validation

subjects: [1, 2, 3, 4, 5]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 20
  n_pipeline_level: 200
  adaptive_step_up: false
  borderline_low: 0.04
  borderline_high: 0.06
  step_up_n_subject_level: 10000

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: true
  use_gedai: true

signal_integrity:
  channels_of_interest: ["C3", "C4"]
  segment_duration_s: 2.0
