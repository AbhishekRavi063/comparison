# Synthetic "Dataset B" for full-test dry run (no real data). Do not use for real results.
data_root: ./data/synth_b
results_root: ./results/synth_b
dataset_label: synth_b

subjects: [1]

sampling_rate: 250
bandpass: { l_freq: 8.0, h_freq: 30.0 }
cv: { n_splits: 5, shuffle: true, random_state: 42 }
permutation: { n_subject_level: 20, n_pipeline_level: 100 }
memory: { float_dtype: float32, n_jobs: 1, save_models: true }
backbones: { use_csp: true, use_tangent_space: true }
denoising: { use_baseline: true, use_icalabel: true, use_gedai: true }
signal_integrity: { channels_of_interest: ["Ch0", "Ch1"], segment_duration_s: 2.0 }
