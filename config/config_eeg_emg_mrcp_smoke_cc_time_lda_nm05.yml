data_root: ./data/eeg_emg_mrcp/processed
results_root: ./results/eeg_emg_mrcp_smoke_cc_time_lda_nm05
dataset_label: eeg_emg_mrcp

subjects: [1, 2, 12]

sampling_rate: 128

bandpass:
  l_freq: 0.1
  h_freq: 1.0

cv:
  n_splits: 2
  shuffle: true
  random_state: 42

statistics:
  subject_chance_method: binomial
  pipeline_comparison_method: mann_whitney

permutation:
  n_subject_level: 0
  n_pipeline_level: 0
  adaptive_step_up: false

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: false
  use_tangent_space: false
  use_time_lda: true

denoising:
  use_baseline: true
  use_icalabel: false
  use_asr: false
  use_gedai: false
  use_gedai_mrcp: true
  gedai_mrcp_prior: class_contrast
  gedai_mrcp_noise_multiplier: 0.5
  gedai_mrcp_retention_min: 0.0

signal_integrity:
  channels_of_interest: ["FC3", "FC1", "FCz", "C3", "C1", "Cz", "CP3", "CP1", "CPz"]
  segment_duration_s: 4.0

generate_plots: false
