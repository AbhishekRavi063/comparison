# AASD paper-style window-CV check: Transformer baseline + GEDAI.
# This reproduces the easier per-window split family of protocols. Do not use
# it alone for strong leakage-resistant claims; pair it with grouped-CV results.
#
# Run:
#   HOME=/tmp MPLCONFIGDIR=/tmp/mplconfig MNE_DONTWRITE_HOME=true \
#   python3 -m src.run_all --config config/config_aasd_transformer_paper_window_full2sub.yml \
#     --results-root results/aasd_transformer_paper_window_full2sub
data_root: ./data/aasd/npz
results_root: ./results/aasd_transformer_paper_window_full2sub
dataset_label: aasd

subjects: [1, 2]

sampling_rate: 128

bandpass:
  l_freq: 0.1
  h_freq: 45.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42
  aasd_group_trials: false

statistics:
  subject_chance_method: binomial
  pipeline_comparison_method: mann_whitney

permutation:
  n_subject_level: 0
  n_pipeline_level: 0
  adaptive_step_up: false

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: false
  use_tangent_space: false
  use_time_lda: false
  use_transformer: true
  transformer_target_sfreq: 128
  transformer_epochs: 50
  transformer_batch_size: 16
  transformer_learning_rate: 0.0001
  transformer_weight_decay: 0.0001
  transformer_dropout: 0.3
  transformer_d_model: 256
  transformer_n_heads: 8
  transformer_n_layers: 4
  transformer_ff_dim: 256
  transformer_val_fraction: 0.125
  transformer_patience: 10
  transformer_device: cpu
  transformer_paper_exact: true

denoising:
  use_baseline: true
  use_icalabel: false
  use_asr: false
  use_gedai: true
  gedai_aasd_adaptive_gate: true
  gedai_aasd_gate_margin: -0.02
  gedai_aasd_gate_inner_splits: 2
  gedai_aasd_perfold_refcov: true
  # Safer blend: dynamic-window labels, less class-discriminative-heavy refcov.
  gedai_aasd_refcov_disc_weight: 0.30
  gedai_aasd_refcov_task_weight: 0.45
  gedai_aasd_refcov_lw_weight: 0.25

signal_integrity:
  channels_of_interest: ["F3", "Fz", "F4", "C3", "Cz", "C4", "P3", "Pz", "P4"]
  segment_duration_s: 1.0
