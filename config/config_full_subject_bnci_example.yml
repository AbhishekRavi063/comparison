# Example config for testing with REAL data: BNCI 2014-001 (BCI Competition IV 2a).
#
# 1. Prepare data first:
#    python -m src.data.prepare_bnci2014_001 --subjects 1 2 3 4 5 6 7 8 9 --out-root data/bnci2014_001
#
# 2. Point this config to that folder. BNCI has 9 subjects (IDs 1–9).
# 3. Run: python -m src.run_all --config config/config_full_subject_bnci_example.yml

# Run this dataset independently; do not mix with PhysioNet.
data_root: ./data/bnci2014_001
results_root: ./results/bnci2014_001
dataset_label: bnci2014_001

subjects: [1, 2, 3, 4, 5, 6, 7, 8, 9]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 1000
  n_pipeline_level: 10000

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: true

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: true
  use_gedai: false

signal_integrity:
  channels_of_interest: ["C3", "Cz", "C4"]
  segment_duration_s: 4.0
