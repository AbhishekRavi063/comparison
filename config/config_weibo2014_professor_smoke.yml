# Weibo2014 — Smoke test for Professor's Fix
# Run: python -m src.run_all --config config/config_weibo2014_professor_smoke.yml

data_root: ./data/weibo2014/processed
results_root: ./results/weibo2014_professor_smoke
dataset_label: weibo2014

subjects: [1]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 2         # Fast smoke test
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 10
  n_pipeline_level: 100

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: true
  use_tangent_space: false

denoising:
  use_baseline: true
  use_icalabel: false
  use_asr: false
  use_gedai: true

signal_integrity:
  channels_of_interest: ["C3", "C4"]
  segment_duration_s: 2.0
