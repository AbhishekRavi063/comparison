# Weibo2014 — Quick smoke test (5 subjects, reduced permutations)
# Runtime: ~15–30 min on MacBook M4 Pro (16 GB RAM)
# Run: python -m src.run_full_test config/config_weibo2014_quick.yml
#
# Peak RAM per subject: ~400 MB → safe on 16 GB
# GEDAI forced to CPU: export PYGEDAI_FORCE_CPU=1

data_root: ./data/weibo2014/processed
results_root: ./results/weibo2014_quick
dataset_label: weibo2014

subjects: [1, 2, 3, 4, 5]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

# Reduced for quick smoke test
permutation:
  n_subject_level: 10
  n_pipeline_level: 100

memory:
  float_dtype: float32
  n_jobs: 1          # NEVER change — 16 GB constraint
  save_models: true

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: true
  use_gedai: true

signal_integrity:
  channels_of_interest: ["C3", "C4"]
  segment_duration_s: 2.0
