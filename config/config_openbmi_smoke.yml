# Smoke Test Config for OpenBMI
dataset_label: openbmi
data_root: data/openbmi/processed
results_root: results/openbmi_smoke

sampling_rate: 250
subjects: [1]

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 2
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 0
  n_pipeline_level: 0

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: true
  use_gedai: true

signal_integrity:
  channels_of_interest: ["C3", "Cz", "C4"]
  segment_duration_s: 4.0
