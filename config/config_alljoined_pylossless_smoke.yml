# Alljoined — 1-subject smoke: baseline + PyLossless (GEDAI off for speed).
#
# Prerequisite: data/alljoined/processed/subject_1.npz
#   python -m src.data.prepare_alljoined --subjects 1 --max-edfs 2 --out-root data/alljoined/processed
#
# Optional: real PyLossless (otherwise pipeline warns and uses bandpass-only for "pylossless"):
#   .venv/bin/pip install pylossless
#
# RUN (macOS/Linux):
#   MPLBACKEND=Agg .venv/bin/python -m src.run_all --config config/config_alljoined_pylossless_smoke.yml
# RUN (Windows PowerShell):
#   $env:MPLBACKEND='Agg'; .\.venv\Scripts\python.exe -m src.run_all --config config/config_alljoined_pylossless_smoke.yml

data_root: ./data/alljoined/processed
results_root: ./results/alljoined_pylossless_smoke
dataset_label: alljoined_1.6m

subjects: [1]

sampling_rate: 250

bandpass:
  l_freq: 1.0
  h_freq: 40.0

cv:
  n_splits: 2
  shuffle: true
  random_state: 42

statistics:
  subject_chance_method: binomial
  pipeline_comparison_method: mann_whitney

permutation:
  n_subject_level: 0
  n_pipeline_level: 200
  adaptive_step_up: false

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: false
  use_asr: false
  use_gedai: false
  use_pylossless: true

signal_integrity:
  channels_of_interest: ["Cz", "O1", "O2", "C3", "C4"]
  segment_duration_s: 2.0

generate_plots: false
