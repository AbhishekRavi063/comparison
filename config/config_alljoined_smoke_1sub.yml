# Alljoined-1.6M - 1-subject smoke test (baseline vs GEDAI only; ICALabel off for faster runs)
# Exercises: CSP + tangent space, baseline + GEDAI (lighter CV/perms than full preprint).
#
# Prerequisite: processed NPZ for subject 1 (see scripts/smoke_alljoined_1sub.sh or .ps1).
# RUN: python -m src.run_all --config config/config_alljoined_smoke_1sub.yml
#
# Cap trials for a fast smoke run. Many-class Alljoined data → two most frequent labels,
# balanced subset (binary) so CSP/LDA + StratifiedKFold stay valid. Omit or null for full subject.

data_root: ./data/alljoined/processed
max_trials: 512
results_root: ./results/alljoined_smoke_1sub
dataset_label: alljoined_1.6m

subjects: [1]

sampling_rate: 250

bandpass:
  l_freq: 1.0
  h_freq: 40.0

cv:
  n_splits: 2
  shuffle: true
  random_state: 42

statistics:
  subject_chance_method: binomial
  pipeline_comparison_method: mann_whitney

permutation:
  n_subject_level: 0
  n_pipeline_level: 200
  # Smoke test: never trigger adaptive step-up (default would add up to 10k extra null
  # permutations when p is ~0.04-0.06 - looks "stuck" and can take many hours).
  adaptive_step_up: false

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: false
  use_asr: false
  use_gedai: true

signal_integrity:
  channels_of_interest: ["Cz", "O1", "O2", "C3", "C4"]
  segment_duration_s: 2.0

generate_plots: true
plot_subjects: [1]
