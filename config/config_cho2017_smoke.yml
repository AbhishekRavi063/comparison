# Cho2017 — Minimal smoke test for pipeline verification
# Runtime: ~2 min
# Run: python -m src.run_all --config config/config_cho2017_smoke.yml

data_root: ./data/cho2017/processed
results_root: ./results/cho2017_smoke
dataset_label: cho2017

subjects: [1, 2]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 2
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 2
  n_pipeline_level: 10

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: false
  use_gedai: true

signal_integrity:
  channels_of_interest: ["C3", "Cz", "C4"]
  segment_duration_s: 2.0
