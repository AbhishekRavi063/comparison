# Alljoined-1.6M — 1 subject, FULL denoising stack (baseline + ICALabel + GEDAI) + CSP + tangent.
# Heavier than config_alljoined_smoke_1sub.yml (which skips ICALabel). Use after:
#   python -m src.data.prepare_alljoined --subjects 1 --all-edfs --out-root data/alljoined/processed
#
# RUN: MPLBACKEND=Agg python -m src.run_all --config config/config_alljoined_smoke_1sub_full.yml

data_root: ./data/alljoined/processed
results_root: ./results/alljoined_smoke_1sub_full
dataset_label: alljoined_1.6m

subjects: [1]

sampling_rate: 250

bandpass:
  l_freq: 1.0
  h_freq: 40.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 100
  n_pipeline_level: 2000
  adaptive_step_up: false

memory:
  float_dtype: float32
  n_jobs: 4
  save_models: true

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: true
  use_asr: false
  use_gedai: true

signal_integrity:
  channels_of_interest: ["Cz", "O1", "O2", "C3", "C4"]
  segment_duration_s: 2.0

generate_plots: true
plot_subjects: [1]
