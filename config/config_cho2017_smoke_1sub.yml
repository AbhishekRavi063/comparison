# Cho2017 (MOABB / GigaDB) - 1-subject smoke test for Windows / env verification
# Baseline vs GEDAI, CSP + tangent, small permutations, no ICALabel, no adaptive step-up.
# Run: python -m src.run_all --config config/config_cho2017_smoke_1sub.yml
#
# Prerequisite: moabb + subject_1.npz (see scripts/smoke_cho2017_1sub.ps1 / .sh)

data_root: ./data/cho2017/processed
results_root: ./results/cho2017_smoke_1sub
dataset_label: cho2017

subjects: [1]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 2
  shuffle: true
  random_state: 42

permutation:
  n_subject_level: 5
  n_pipeline_level: 20
  adaptive_step_up: false

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: false

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: false
  use_gedai: true

signal_integrity:
  channels_of_interest: ["C3", "Cz", "C4"]
  segment_duration_s: 2.0
