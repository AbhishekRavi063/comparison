# Test config: few subjects, small permutations, for fast integration tests.
# Override data_root and results_root when running tests (e.g. tmp_path).

data_root: ./data
results_root: ./results

subjects: [1, 2]

sampling_rate: 250

bandpass:
  l_freq: 8.0
  h_freq: 30.0

cv:
  n_splits: 5
  shuffle: true
  random_state: 42

# Minimal for quick tests
permutation:
  n_subject_level: 15
  n_pipeline_level: 50

memory:
  float_dtype: float32
  n_jobs: 1
  save_models: true

backbones:
  use_csp: true
  use_tangent_space: true

denoising:
  use_baseline: true
  use_icalabel: true   # set false in tests that skip MNE
  use_gedai: false

signal_integrity:
  channels_of_interest: ["Ch0", "Ch1"]
  segment_duration_s: 2.0
